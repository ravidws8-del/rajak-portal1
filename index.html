<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ICON (GitHub Logo) -->
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/dwsbspautomation2023-alt/dws/main/dwslogo.png">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#473787">

<!-- APP ICON (Mobile) -->
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/dwsbspautomation2023-alt/dws/main/dwslogo.png">

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- SWEETALERT -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

body {
    background: linear-gradient(135deg, rgb(71,55,135), #5f4bb6, #9f7aea);
    height:100vh;
    font-family: 'Segoe UI', sans-serif;
}

.center-box {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card {
    width:100%;
    max-width:420px;
    padding:20px;
    border-radius:20px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(15px);
    color:#fff;
    box-shadow: 0 10px 40px rgba(71,55,135,0.6);
}

.form-control, select, textarea {
    border-radius:10px;
    border:none;
    padding:10px;
    background: rgba(255,255,255,0.9);
}

label {
    font-size: 13px;
    margin-bottom: 3px;
    color: #ddd;
}

.btn {
    border-radius:10px;
}
.btn-primary { background:#fff; color:#473787; }
.btn-success { background:#c73f15; }
.btn-dark { background:#2e6695; }

.spinner-overlay {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.table-container {
    max-height:300px;
    overflow:auto;
    background:#fff;
    color:#000;
    border-radius:10px;
}

.table thead th {
    position: sticky;
    top: 0;
    background:#2d2a55;
    color:#fff;
}

/* Fix date shrink */
.table { min-width:700px; }

.table th:nth-child(3),
.table th:nth-child(4),
.table td:nth-child(3),
.table td:nth-child(4) {
    white-space: nowrap;
    min-width:130px;
    text-align:center;
}

.table td:nth-child(2) {
    max-width:200px;
    word-break:break-word;
}

</style>

</head>

<body>

<!-- LOADER -->
<div class="spinner-overlay" id="loader">
    <div class="spinner-border text-light"></div>
</div>

<!-- LOGIN -->
<div class="center-box" id="loginBox">
  <div class="card p-4 shadow" style="width: 350px;">

    <!-- Round Logo -->
    <img src="https://raw.githubusercontent.com/dwsbspautomation2023-alt/dws/main/dwslogo.png"
         style="width:100px; height:100px; object-fit:cover; 
                border-radius:50%; display:block; margin:auto; border:2px solid #ddd;">

    <h5 class="text-center mt-2 mb-3">DIGITAL WEIGHING SYSTEMS</h5>

    <h4 class="text-center mb-3">🔐 Login</h4>

    <!-- USERNAME -->
    <div class="mb-3">
      <label>Username</label>
      <input id="username" type="text" class="form-control" placeholder="Enter username">
    </div>

    <!-- PASSWORD -->
    <div class="mb-3">
      <label>Password</label>
      <input id="password" type="password" class="form-control" placeholder="Enter password">
    </div>

    <!-- BUTTON -->
    <button class="btn btn-dark w-100" onclick="login()">Login</button>

    <!-- MESSAGE -->
    <div id="loginMsg" class="text-center mt-2 text-danger"></div>

  </div>
</div>

<!-- FORM -->
<div class="center-box" id="formBox" style="display:none;">
<div class="card">

<div class="d-flex justify-content-between mb-2">
<small><span style="color:#ffc107;">👤</span> <b id="showUser"></b></small>
<button class="btn btn-sm btn-light" onclick="openReport()">📊 Report</button>
<button class="btn btn-sm btn-danger" onclick="logout()">👤 Logout</button>
</div>

<h5 class="text-center mb-3">
  <span style="color:#ffc107; font-size:18px;">👤</span> Employee Activity Portal
</h5>

<input id="empname" hidden>
<input id="chatid" hidden>

<label>Select Type</label>
<select id="type" class="form-control mb-2">
<option value="">Select Type</option>
<option value="Preset">Site Engineer attendance</option>
<option value="Leave">Leave</option>
<option value="HalfDay">HalfDay</option>
<option value="Tour">Tour</option>
<option value="Late">Late</option>
</select>

<label>Reason</label>
<textarea id="reason" class="form-control mb-2" placeholder="Enter reason"></textarea>

<div id="fromBox">
<label>From Date</label>
<input id="fromdate" type="date" class="form-control mb-2">
</div>

<label>To Date</label>
<input id="todate" type="date" class="form-control mb-3">

<button class="btn btn-primary w-100 mb-2" onclick="sendData()">Submit</button>
<div id="locationText" class="text-center mt-2" style="font-size:12px; color:#ffc107;"></div>

<div id="msg" class="text-center mt-2"></div>

</div>
</div>

<!-- REPORT -->
<div class="center-box" id="reportBox" style="display:none;">
<div class="card">

<h5 class="text-center mb-3">📊 My Report</h5>

<input id="r_from" type="date" class="form-control mb-2">
<input id="r_to" type="date" class="form-control mb-3">

<button class="btn btn-success w-100 mb-3" onclick="getReport()">Get Report</button>

<div id="summary" class="mb-2"></div>
<div id="reportData"></div>

<button class="btn btn-secondary w-100 mt-2" onclick="backToForm()">Back</button>

</div>
</div>

<script>
let currentLat = "";
let currentLng = "";
let currentAddress = "";
let apiUrl = "https://script.google.com/macros/s/AKfycby2OfGsLuB_gCUFxnfnQ3ii2Pybl_f_KZuY42629F8oaRqQvJKCqlA7Q23AcPJE2kA/exec";
let currentUser = "";

/* LOGIN */
function login(){

    if(username.value.trim()=="" || password.value.trim()==""){
        Swal.fire("Error","Username aur Password blank nahi ho sakta","warning");
        return;
    }

    if (!navigator.geolocation) {
        Swal.fire("Error","Location not supported","error");
        return;
    }

    navigator.geolocation.getCurrentPosition(

        function(pos){

            let lat = pos.coords.latitude;
            let lng = pos.coords.longitude;

            // ⭐ ADDRESS FETCH
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
            .then(res=>res.json())
            .then(loc=>{

                let address = loc.display_name || "Unknown Location";

                loader.style.display="flex";

                fetch(apiUrl+"?action=login",{
                    method:"POST",
                    body:JSON.stringify({
                        username:username.value,
                        password:password.value,
                        Latitude: lat,
                        Longitude: lng,
                        Address: address   // ⭐ send to backend
                    })
                })
                .then(res=>res.json())
                .then(res=>{
                    loader.style.display="none";

                    if(res.status==="success"){

                        loginBox.style.display="none";
                        formBox.style.display="flex";

                        empname.value=res.name;
                        chatid.value=res.chatId;

                        currentUser=res.name;

                        // ⭐ NAME + LOCATION SHOW
                        showUser.innerText = res.name 

                        Swal.fire("Welcome", res.name, "success");

                    }else{
                        loginMsg.innerHTML="❌ Invalid Login";
                    }

                });

            });

        },

        function(err){

            Swal.fire({
                title: "Location Required",
                text: "Login ke liye Location ON karna zaroori hai",
                icon: "error",
                confirmButtonText: "OK"
            });

        },

        {
            enableHighAccuracy: true,
            timeout: 10000
        }
    );
}

type.addEventListener("change", function(){

let today = new Date().toISOString().split('T')[0];

// ✅ Leave + Tour → editable range
if(type.value==="Leave" || type.value==="Tour"){
    fromBox.style.display="block";
    fromdate.disabled=false;
    todate.disabled=false;
}

// ✅ Preset → TODAY + LOCK
else if(type.value==="Preset"){
    fromBox.style.display="block";

    fromdate.value = today;
    todate.value = today;

    fromdate.disabled = true;
    todate.disabled = true;
}

// ❗ Late / HalfDay → single date auto
else{
    fromBox.style.display="none";

    fromdate.value = today;
    todate.value = today;

    fromdate.disabled = true;
    todate.disabled = true;
}

});


function submitFinal(){

let from="", to="";

if(type.value === "Leave" || type.value === "Tour"){
    from = fromdate.value;
    to = todate.value;
}else{
    from = todate.value;
    to = todate.value;
}

loader.style.display="flex";

fetch(apiUrl,{
method:"POST",
body:JSON.stringify([{
    EmpidName:empname.value,
    ChatID:chatid.value,
    Type:type.value,
    Reason:reason.value,
    FromDate:from,
    ToDate:to,

    // ⭐ LOCATION (HAR TYPE KE LIYE)
    Latitude: currentLat,
    Longitude: currentLng,
    Address: currentAddress
}])
})
.then(res=>res.json())
.then(res=>{
    loader.style.display="none";

    if(res.status==="blocked"){
        Swal.fire("Late Over","Only 2 Late allowed","error");
        return;
    }

    Swal.fire("Saved!","Data submitted","success");

    type.value="";
    reason.value="";
});
}
function getLocation(){

    if (!navigator.geolocation) {
        locationText.innerHTML = "❌ Location not supported";
        return;
    }

    navigator.geolocation.getCurrentPosition(

        function(pos){

            currentLat = pos.coords.latitude;
            currentLng = pos.coords.longitude;

            // ⭐ Address fetch
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentLat}&lon=${currentLng}`)
            .then(res=>res.json())
            .then(loc=>{

                currentAddress = loc.display_name || "Unknown";

                // ⭐ UI me show karo
                locationText.innerHTML = "📍 " + currentAddress;

            });

        },

        function(err){
            locationText.innerHTML = "❌ Location OFF hai";
        },

        {
            enableHighAccuracy: true,
            timeout: 10000
        }
    );
}
/* SEND */
function sendData(){

if(type.value==""||reason.value==""){
    msg.innerHTML="⚠ Fill all";
    return;
}

// ⭐ STEP 1: GET LIVE LOCATION FIRST
navigator.geolocation.getCurrentPosition(

function(pos){

    currentLat = pos.coords.latitude;
    currentLng = pos.coords.longitude;

    // ⭐ ADDRESS FETCH
    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${currentLat}&lon=${currentLng}`)
    .then(res=>res.json())
    .then(loc=>{

        currentAddress = loc.display_name || "Unknown";

        locationText.innerHTML = "📍 " + currentAddress;

        // ⭐ STEP 2: NOW SEND DATA
        submitFinal();

    });

},

function(err){
    Swal.fire("Error","Location ON karo","error");
}

);

}
function logout(){
    Swal.fire({
        title: 'Logout?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Logout'
    }).then((result) => {
        if(result.isConfirmed){
            loginBox.style.display="flex";
            formBox.style.display="none";
            reportBox.style.display="none";
        }
    });
}

/* REPORT */
// function openReport(){
//     formBox.style.display="none";
//     reportBox.style.display="flex";
//     let today = new Date().toISOString().split('T')[0];
//     r_from.value = today;
//     r_to.value = today;
// }
function openReport(){
    formBox.style.display="none";
    reportBox.style.display="flex";

    let today = new Date().toISOString().split('T')[0];
    r_from.value = today;
    r_to.value = today;

    // 🔥 clear old report instantly
    reportData.innerHTML = "";
    summary.innerHTML = "";
}

function backToForm(){
reportBox.style.display="none";
formBox.style.display="flex";
}

function formatDate(dt) {
    let d = new Date(dt);
    let day = String(d.getDate()).padStart(2, '0');
    let month = String(d.getMonth() + 1).padStart(2, '0');
    let year = d.getFullYear();
    return `${day}-${month}-${year}`;
}


function getReport(){
loader.style.display="flex";

fetch(apiUrl,{
method:"POST",
body:JSON.stringify({
action:"getReport",
EmpID:currentUser,
fromDate:r_from.value,
toDate:r_to.value
})
})
.then(res=>res.json())
.then(res=>{
loader.style.display="none";

// ================= DATA =================
let allData = res.data || [];
let s = res.summary || {};

// ================= DATE RANGE =================
let start = new Date(r_from.value);
let end = new Date(r_to.value);

// normalize (IMPORTANT FIX)
start.setHours(0,0,0,0);
end.setHours(23,59,59,999);

// ================= FILTERED DATA (TABLE ONLY) =================
let filtered = allData.filter(r => {

    let from = new Date(r.FromDate);
    let to = new Date(r.ToDate);

    if(isNaN(from) || isNaN(to)) return false;

    from.setHours(0,0,0,0);
    to.setHours(0,0,0,0);

    // 🔥 PERFECT OVERLAP LOGIC (FIXED)
    return !(to < start || from > end);
});

// ================= COUNTERS =================
let late=0, leave=0, tour=0, half=0;

filtered.forEach(r=>{

let type = String(r.Type).trim().toLowerCase();

// Late
if(type === "late") late++;

// Tour (FIXED)
if(type === "tour"){
    let f = new Date(r.FromDate);
    let t = new Date(r.ToDate);

    if(!isNaN(f) && !isNaN(t)){
        tour += Math.ceil((t - f)/(1000*60*60*24)) + 1;
    }
}

// HalfDay
if(type === "halfday") half++;

// Leave (date-wise)
if(type === "leave"){
    let f = new Date(r.FromDate);
    let t = new Date(r.ToDate);

    f.setHours(0,0,0,0);
    t.setHours(0,0,0,0);

    if(!isNaN(f) && !isNaN(t)){
        leave += Math.ceil((t - f)/(1000*60*60*24)) + 1;
    }
}

});

// ================= TOTAL LEAVE =================
let total = s.total || 30;

// ================= FULL YEAR USED =================
let used = 0;

allData.forEach(r=>{

let type = String(r.Type).trim().toLowerCase();

if(type === "leave"){
    let f = new Date(r.FromDate);
    let t = new Date(r.ToDate);

    if(!isNaN(f) && !isNaN(t)){
        used += Math.ceil((t - f)/(1000*60*60*24)) + 1;
    }
}

if(type === "halfday"){
    used += 0.5;
}

});

let balance = total - used;
if(balance < 0) balance = 0;

// ================= SUMMARY =================
summary.innerHTML = `
<span class="badge bg-success">Total Leave: ${total}</span>
<span class="badge bg-danger">Late: ${late}</span>
<span class="badge bg-primary">Leave: ${leave}</span>
<span class="badge bg-warning text-dark">HalfDay: ${half}</span>
<span class="badge bg-info text-dark">Tour: ${tour}</span>
<span class="badge bg-secondary">Leave Used: ${used}</span>
<span class="badge bg-dark">Leave Bal.: ${balance}</span>
`;

// ================= TABLE =================
let html = "<div class='table-container'><table class='table table-bordered'>";

html += `
<thead>
<tr>
<th>Type</th>
<th>Reason</th>
<th>From</th>
<th>To</th>
<th>No of Days</th>
</tr>
</thead>
<tbody>
`;

filtered.forEach(r=>{

let type = String(r.Type).trim().toLowerCase();

let days = 1;

// ✅ Leave & Tour = DATE RANGE
if(type === "leave" || type === "tour"){

    let f = new Date(r.FromDate);
    let t = new Date(r.ToDate);

    if(!isNaN(f) && !isNaN(t)){
        days = Math.ceil((t - f)/(1000*60*60*24)) + 1;
    }
}

// ❗ HalfDay = 0.5
else if(type === "halfday"){
    days = 0.5;
}

html += `
<tr>
<td>${r.Type}</td>
<td>${r.Reason}</td>
<td>${formatDate(r.FromDate)}</td>
<td>${formatDate(r.ToDate)}</td>
<td><b>${days}</b></td>
</tr>
`;
});

html += "</tbody></table></div>";

reportData.innerHTML = html;

});
}

/* DEFAULT */
// window.onload=()=>{
// let today=new Date().toISOString().split('T')[0];
// fromdate.value=today;
// todate.value=today;
// }
window.onload = () => {

    let today = new Date().toISOString().split('T')[0];

    // default dates
    fromdate.value = today;
    todate.value = today;

    r_from.value = today;
    r_to.value = today;

    // ✅ RESET UI ON REFRESH
    loginBox.style.display = "flex";
    formBox.style.display = "none";
    reportBox.style.display = "none";

    reportData.innerHTML = "";
    summary.innerHTML = "";

    // reset user
    currentUser = "";
    empname.value = "";
    chatid.value = "";
    showUser.innerText = "";
    getLocation();
};

/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
