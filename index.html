<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Loan System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ✅ FIX: Hindi Font -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>

  body {
    font-family: "Noto Sans Devanagari","Noto Sans","Segoe UI Emoji","Noto Color Emoji","Apple Color Emoji", Arial, sans-serif;
    background: #eef2f7;
  }

  .box {
    max-width: 750px;
    margin: auto;
    margin-top: 40px;
  }

  .card {
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  }

  #dashboard {
    display: none;
  }

  .form-section {
    display: none;
  }

  .spinner-border {
    width: 1rem;
    height: 1rem;
  }

  </style>
</head>

<body>

<div class="box">

<!-- LOGIN -->
<div class="card" id="loginBox">
  <h4>🔐 Login</h4>

  <input id="u" class="form-control mt-2" placeholder="Username">
  <input id="p" type="password" class="form-control mt-2" placeholder="Password">

  <button id="loginBtn" class="btn btn-primary w-100 mt-3" onclick="login()">
    <span id="loginText">Login</span>
    <span id="loginSpin" class="spinner-border d-none"></span>
  </button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">

  <div class="card text-center mb-3">
    <h5>💼 सामाजिक बैलेंस राशि</h5>
    <h2 id="balance">0</h2>

    <hr>

    <h6>💰 टोटल दिया गया रुपये</h6>
    <h3 id="distribution">0</h3>

    <hr>

    <h6>📊 टोटल ब्याज</h6>
    <h3 id="interest">0</h3>
  </div>

  <div class="card mb-3">
    <select id="menu" class="form-select" onchange="showForm(this.value)">
      <option value="">-- Select Option --</option>
      <option value="loan">Loan Entry</option>
      <option value="payment">Payment Entry</option>
      <option value="report">Report</option>
    </select>
  </div>

  <!-- LOAN -->
  <div class="card form-section" id="loanForm">
    <h4>💰 Loan Entry</h4>

    <input id="lname" class="form-control mt-2" placeholder="Member Name">
    <input type="date" id="ldate" class="form-control mt-2">
    <input id="lamount" class="form-control mt-2" placeholder="Loan Amount">
    <input id="lint" class="form-control mt-2" value="3">
    <input id="lmon" class="form-control mt-2" placeholder="Months">

    <button class="btn btn-success w-100 mt-3" onclick="saveLoan()">
      Save Loan
    </button>
  </div>

  <!-- PAYMENT -->
  <div class="card form-section" id="paymentForm">
    <h4>💵 Payment Entry</h4>

    <input id="pname" class="form-control mt-2" placeholder="Member Name">
    <input type="date" id="pdate" class="form-control mt-2">
    <input id="pamount" class="form-control mt-2" placeholder="Amount">
    <input id="premark" class="form-control mt-2" placeholder="Remark">

    <button class="btn btn-primary w-100 mt-3" onclick="savePayment()">
      Save Payment
    </button>
  </div>

  <!-- REPORT -->
  <div class="card form-section" id="reportBox">
    <h4>📊 Report</h4>

    <div class="row mb-2">
      <div class="col">
        <select id="rmonth" class="form-select">
          <option value="1">Jan</option>
          <option value="2">Feb</option>
          <option value="3">Mar</option>
          <option value="4">Apr</option>
          <option value="5">May</option>
          <option value="6">Jun</option>
          <option value="7">Jul</option>
          <option value="8">Aug</option>
          <option value="9">Sep</option>
          <option value="10">Oct</option>
          <option value="11">Nov</option>
          <option value="12">Dec</option>
        </select>
      </div>

      <div class="col">
        <input id="ryear" class="form-control" placeholder="Year">
      </div>
    </div>

    <button class="btn btn-dark w-100 mb-2" onclick="loadReport()">
      Load Report
    </button>

    <div id="reportData"></div>
  </div>

</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw2Mf9Zlei7X5Gzh_wvicvl47qvNv8HCUcqsRrElo_noIpMoDDeoQk5aQrzH2Iklzxw4Q/exec";

let userRole = "";

/* ================= LOGIN ================= */
function login(){

  loginBtn.disabled = true;
  loginText.innerText = "Logging...";
  loginSpin.classList.remove("d-none");

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      username:u.value,
      password:p.value
    })
  })
  .then(r=>r.json())
  .then(d=>{

    if(d.status=="success"){

      userRole = d.role || "user";

      document.getElementById("loginBox").style.display="none";
      document.getElementById("dashboard").style.display="block";

      applyRoleUI();

      loadBalance();
      loadInterest();
      loadDistribution();
    }
    else{
      Swal.fire("Error","Invalid Login","error");
    }

  })
  .finally(()=>{

    loginBtn.disabled = false;
    loginText.innerText = "Login";
    loginSpin.classList.add("d-none");

  });

}

/* ================= ROLE ================= */
function applyRoleUI(){

  if(userRole === "operator"){

    document.getElementById("menu").innerHTML = `
      <option value="">-- Select Option --</option>
      <option value="report">📊 Report</option>
    `;

    document.getElementById("loanForm").style.display = "none";
    document.getElementById("paymentForm").style.display = "none";
  }
}

/* ================= FORM ================= */
function showForm(type){

  document.querySelectorAll(".form-section").forEach(f=>{
    f.style.display="none";
  });

  if(type=="loan") loanForm.style.display="block";
  if(type=="payment") paymentForm.style.display="block";
  if(type=="report") reportBox.style.display="block";
}

/* ================= BALANCE ================= */
function loadBalance(){
  fetch(API_URL+"?action=balance")
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("balance").innerText = d.balance;
  });
}

/* ================= DISTRIBUTION ================= */
function loadDistribution(){
  fetch(API_URL+"?action=distribution")
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("distribution").innerText = d.distribution;
  });
}

/* ================= INTEREST ================= */
function loadInterest(){
  fetch(API_URL+"?action=interest")
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("interest").innerText = d.interest;
  });
}

</script>

</body>
</html>
